<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Idea Suggestions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .input-section {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
        }

        .form-group {
            display: grid;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        label {
            font-size: 0.95rem;
            font-weight: 500;
            color: #cbd5e1;
        }

        textarea {
            width: 100%;
            min-height: 140px;
            padding: 1rem;
            background: #020617;
            border: 1px solid #1f2937;
            border-radius: 12px;
            color: #e2e8f0;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .button-row {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        button {
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #generateBtn {
            background: #2563eb;
            color: white;
            flex: 1;
        }

        #generateBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.3);
        }

        #generateBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            height: 1.5rem;
            color: #93c5fd;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status.error {
            color: #fb7185;
        }

        .status.loading::after {
            content: "";
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(147, 197, 253, 0.3);
            border-top-color: #93c5fd;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .results-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .suggestion-card {
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid;
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .suggestion-card.improved {
            border-color: #16a34a;
        }

        .suggestion-card.alternative {
            border-color: #2563eb;
        }

.suggestion-card.challenges {
      border-color: #f59e0b;
    }

    .suggestion-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3);
    }

    .card-label {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .suggestion-card.improved .card-label {
      color: #86efac;
    }

    .suggestion-card.alternative .card-label {
      color: #93c5fd;
    }

    .suggestion-card.challenges .card-label {
            color: #fcd34d;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: #f8fafc;
        }

        .card-description {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 1rem;
        }

        .card-explanation {
            font-size: 0.9rem;
            font-style: italic;
            color: #94a3b8;
            padding: 0.75rem;
            background: rgba(0, 0, 0, 0.2);
            border-left: 2px solid currentColor;
            border-radius: 4px;
            margin-bottom: 1rem;
        }

        .card-actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .card-actions button {
            flex: 1;
            min-width: 100px;
            padding: 0.6rem 1rem;
            font-size: 0.9rem;
            background: #111827;
            border: 1px solid #334155;
            color: #e2e8f0;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .card-actions button:hover {
            background: #1f2937;
            transform: translateY(-1px);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .results-section {
                grid-template-columns: 1fr;
            }

            .button-row {
                flex-direction: column;
            }

            #generateBtn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Design Feedback Generator</h1>
        <p class="subtitle">Task explanation...</p>

        <div class="input-section">
            <div class="form-group">
                <label for="prompt">Your Design Idea</label>
                <textarea id="prompt" placeholder="Describe your design idea, concept, or product..."></textarea>
            </div>
            <div class="button-row">
                <button id="generateBtn" onclick="generateSuggestions()">Generate Suggestions</button>
            </div>
            <div class="status" id="status"></div>
        </div>

        <div class="results-section" id="results"></div>
    </div>

    <script>
        const resultsEl = document.getElementById('results');
        const statusEl = document.getElementById('status');
        const generateBtn = document.getElementById('generateBtn');
        let currentStep = 0;
        let savedIdea = "";
        let savedSuggestions = null;
        let modificationsLog = [];

        async function generateSuggestions() {
            currentStep = 0;
            savedSuggestions = null;
            savedIdea = "";
            const idea = document.getElementById("prompt").value.trim();
            
            if (!idea) {
                setStatus("Please enter your design idea first.", "error");
                return;
            }
            
            setStatus("Generating suggestions...", "loading");
            resultsEl.innerHTML = "";
            generateBtn.disabled = true;
            
            try {
                const response = await fetch('/api/get-suggestions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idea })
                });
                
                if (!response.ok) {
                    const error = await response.text();
                    throw new Error(error || `Server error: ${response.status}`);
                }
                
                const data = await response.json();
                //renderSuggestions(data);
                savedSuggestions = data;
                savedIdea = idea;
                currentStep = 1;
                renderStep();
                setStatus("Suggestions generated!");
            } catch (error) {
                setStatus(error.message, "error");
            } finally {
                generateBtn.disabled = false;
            }
        }

        function renderSuggestions(data) {
            resultsEl.innerHTML = "";
            
            const suggestions = [
                {
                    key: "improved",
                    label: "✨ Improvement",
                    type: "improved",
                    data: data.improved
                },
                {
                    key: "alternative",
                    label: "🔄 Alternative",
                    type: "alternative",
                    data: data.alternative
                },
                {
                    key: "challenges",
                    label: "⚠️ Challenges & Concerns",
                    type: "challenges",
                    data: data.challenges
                }
            ];

            suggestions.forEach(suggestion => {
                const card = createCard(suggestion);
                resultsEl.appendChild(card);
            });
        }

        /*function createCard(suggestion) {
            const card = document.createElement("div");
            card.className = `suggestion-card ${suggestion.type}`;
            
            const label = document.createElement("div");
            label.className = "card-label";
            label.textContent = suggestion.label;
            
            const title = document.createElement("h3");
            title.className = "card-title";
            title.textContent = suggestion.data.title || "Untitled";
            
            const description = document.createElement("p");
            description.className = "card-description";
            description.textContent = suggestion.data.description || "No description available.";
            
            card.append(label, title, description);
            
            // Handle both "explanation" (old) and "suggestion" (new)
            const extraText = suggestion.data.explanation || suggestion.data.suggestion;
            if (extraText) {
                const extra = document.createElement("p");
                extra.className = "card-explanation";
                extra.innerHTML = suggestion.data.suggestion 
                    ? `<strong>How to address:</strong> ${extraText}`
                    : `<strong>Why:</strong> ${extraText}`;
                card.appendChild(extra);
            }
            
            const actions = document.createElement("div");
            actions.className = "card-actions";
            
            card.appendChild(actions);
            
            return card;
        }*/

        function setStatus(message, type = "info") {
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
        }

        function renderStep() {
            resultsEl.innerHTML = "";

            if (currentStep === 1) {
                resultsEl.innerHTML = `
                    <div class="suggestion-card improved">
                        <p class="card-description"> You will now receive AI-generated suggestions to reflect on your idea.</p>
                        <div class="card-label">Step 1 of 5: Your Original Idea</div>
                        <h3 class="card-title">Your idea</h3>
                        <p class="card-description">${savedIdea}</p>
                        <button onclick="nextStep()">Continue to AI Suggestions</button>
                    </div>
                `;
            }

            if (currentStep === 2) {
                renderSingleSuggestion(
                    "Step 2 of 5: Improvement Suggestion (Refine  your idea)",
                    "improved",
                    savedSuggestions.improved,
                    "This suggestion keeps your original idea, but tries to strengthen or refine it."
                );
            }

            if (currentStep === 3) {
                renderSingleSuggestion(
                    "Step 3 of 5: Alternative Direction (Explore a different approach)",
                    "alternative",
                    savedSuggestions.alternative,
                    "This suggestion proposes a different way to solve the same problem."
                );
            }

            if (currentStep === 4) {
                renderSingleSuggestion(
                    "Step 4 of 5: Critical Reflection (Identify potential issues)",
                    "challenges",
                    savedSuggestions.challenges,
                    "This suggestion challenges your idea by pointing out possible weaknesses or assumptions."
                );
            }

            if (currentStep === 5) {
                resultsEl.innerHTML = `
                    <div class="suggestion-card">
                        <div class="card-label">Step 5 of 5: Final Reflection</div>
                        <h3 class="card-title">Revise your idea</h3>
                        <p class="card-description">Based on the suggestions, would you change your original idea?</p>
                        <textarea id="finalIdea">${savedIdea}</textarea>
                    </div>
                `;
            }
}
        
        function renderSingleSuggestion(label, type, data, explanation) {
            resultsEl.innerHTML = `
                <div class="suggestion-card ${type}">
                    <div class="card-label">${label}</div>
                    <h3 class="card-title">${data.title || "Untitled"}</h3>
                    <p class="card-description">${data.description || ""}</p>
                    <p class="card-explanation">${explanation}</p>

                    <div class="card-actions">
                        <button onclick="chooseAndContinue('${type}', 'accept')">Accept</button>
                        <button onclick="chooseAndContinue('${type}', 'ignore')">Ignore</button>
                        <button onclick="showModifyBox('${type}')">Modify</button>
                    </div>

                    <div id="modifyBox-${type}" style="display:none; margin-top: 1rem;">
                        <label for="modifiedText-${type}">How would you modify your idea based on this suggestion?</label>
                        <textarea id="modifiedText-${type}">${savedIdea}</textarea>
                        <button onclick="saveModification('${type}')">Save modification</button>
                    </div>

                    <br>
                    <button onclick="regenerateCurrentSuggestion('${type}')">Generate one more ${type}</button>
                    <button onclick="nextStep()">Next</button>
                </div>
            `;
}    
        
        function nextStep() {
            currentStep++;
            renderStep();
        }
        
        function chooseAndContinue(type, decision) {
            logDecision(type, decision);
            nextStep();
        }
        
        function showModifyBox(type) {
            logDecision(type, "modify_started");

            const box = document.getElementById(`modifyBox-${type}`)
            if (box) {
                box.style.display = "block";
            }

            setStatus("Modify your idea, then save when ready.", "info");
        }

        function saveModification(type) {
            const modifiedText = document.getElementById(`modifiedText-${type}`).value.trim();

            if (!modifiedText) {
                setStatus("Please write a modified idea before saving.", "error");
                return;
            }

            modificationsLog.push({
                step: currentStep,
                suggestionType: type,
                previousIdea: savedIdea,
                modifiedIdea: modifiedText,
                timestamp: new Date().toISOString()
            });

            savedIdea = modifiedText;
            logDecision(type, "modify_saved");
            console.log("Modification saved:", modificationsLog);

            setStatus("Modification saved. You can continue.", "info");

            const box = document.getElementById(`modifyBox-${type}`);
            if (box) {
                box.style.display = "none";
            }
        }
        
        async function regenerateCurrentSuggestion(type) {
            setStatus("Generating another suggestion...", "loading");

            try {
                const response = await fetch('/api/regenerate-suggestion', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        idea: savedIdea,
                        type: type
                    })
                });

                if (!response.ok) {
                    const error = await response.text();
                    throw new Error(error || `Server error: ${response.status}`);
                }

                const data = await response.json();

                if (type === "improved") {
                    savedSuggestions.improved = data;
                    currentStep = 2;
                }

                if (type === "alternative") {
                    savedSuggestions.alternative = data;
                    currentStep = 3;
                }

                if (type === "challenges") {
                    savedSuggestions.challenges = data;
                    currentStep = 4;
                }

                renderStep();
                setStatus("New suggestion generated!");
            } catch (error) {
                setStatus(error.message, "error");
            }
}

        function logDecision(type, decision) {
            console.log({
                suggestionType: type,
                decision: decision,
                timestamp: new Date().toISOString()
            });

            alert(`Logged: ${decision} for ${type}`);
        }
    </script>
</body>
</html>
